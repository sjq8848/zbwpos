name: Build and Release

on:
  push:
    branches: [master]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  APP_NAME: zbwpos
  APP_VERSION: '1.0.0'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.2.4'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          cache: true

      - name: Build
        shell: cmd
        run: |
          mkdir build
          cd build
          qmake ..\zbwpos.pro CONFIG+=release
          nmake

      - name: Deploy
        if: success()
        shell: cmd
        run: |
          mkdir install\bin
          copy build\src\app\release\zbwpos.exe install\bin\
          cd install\bin
          windeployqt --release --no-translations zbwpos.exe

      - name: Create ZIP
        if: success()
        run: 7z a -tzip zbwpos-${{ env.APP_VERSION }}-windows-x64.zip install\bin

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: zbwpos-*-windows-x64.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.2.4'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          cache: true

      - name: Build
        run: |
          mkdir -p build
          cd build
          qmake ../zbwpos.pro CONFIG+=release
          make -j$(sysctl -n hw.ncpu)

      - name: Create App Bundle
        if: success()
        run: |
          mkdir -p install/zbwpos.app/Contents/MacOS
          mkdir -p install/zbwpos.app/Contents/Resources
          cp build/src/app/zbwpos.app/Contents/MacOS/zbwpos install/zbwpos.app/Contents/MacOS/ || \
          cp build/src/app/zbwpos install/zbwpos.app/Contents/MacOS/

          cat > install/zbwpos.app/Contents/Info.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>zbwpos</string>
              <key>CFBundleIdentifier</key>
              <string>com.zbw.pos</string>
              <key>CFBundleName</key>
              <string>ZBW POS</string>
              <key>CFBundleVersion</key>
              <string>${{ env.APP_VERSION }}</string>
              <key>CFBundleShortVersionString</key>
              <string>${{ env.APP_VERSION }}</string>
              <key>LSMinimumSystemVersion</key>
              <string>10.14</string>
          </dict>
          </plist>
          EOF

      - name: Deploy
        if: success()
        run: macdeployqt install/zbwpos.app -no-translations

      - name: Create DMG
        if: success()
        run: hdiutil create -volname "ZBW POS" -srcfolder install/zbwpos.app -ov -format UDZW zbwpos-${{ env.APP_VERSION }}-macos.dmg

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: zbwpos-*-macos.dmg

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libxcb-xinerama0 \
            libxkbcommon-x11-0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.2.4'
          host: 'linux'
          target: 'desktop'
          arch: 'gcc_64'
          cache: true

      - name: Build
        run: |
          mkdir -p build
          cd build
          qmake ../zbwpos.pro CONFIG+=release
          make -j$(nproc)

      - name: Create Package
        if: success()
        run: |
          mkdir -p install/bin
          cp build/src/app/zbwpos install/bin/
          tar -czvf zbwpos-${{ env.APP_VERSION }}-linux-x64.tar.gz -C install bin

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: zbwpos-*-linux-x64.tar.gz

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -laR artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
