name: Build and Release

on:
  push:
    branches: [master]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  APP_NAME: zbwpos
  APP_VERSION: '1.0.0'

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libxcb-xinerama0 libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libx11-xcb-dev libegl1

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.2.4'
          host: 'linux'
          target: 'desktop'
          arch: 'gcc_64'
          cache: true

      - name: Build
        run: |
          cd src/app
          echo "=== qmake ==="
          qmake app.pro CONFIG+=release
          echo ""
          echo "=== Makefile check ==="
          head -50 Makefile || echo "No Makefile"
          echo ""
          echo "=== Building with verbose output ==="
          make -j1 V=1 2>&1 | head -100
          echo ""
          echo "=== Build result ==="
          ls -la

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: src/app/Makefile

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.2.4'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          cache: true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build
        shell: cmd
        run: |
          cd src\app
          echo "=== qmake ==="
          qmake app.pro CONFIG+=release
          echo.
          echo "=== Makefile check ==="
          type Makefile 2>nul | findstr /n "^" | findstr "^[1-5]:" || echo "No Makefile or empty"
          echo.
          echo "=== Building ==="
          nmake /NOLOGO 2>&1

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-win
          path: src/app/Makefile*
